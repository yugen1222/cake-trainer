<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Вход — Тренажёр витрины</title>

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/znak.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">Тренажёр витрины</div>
      <div class="auth-sub">Введи имя и выбери смену</div>

      <img class="hero-img" src="{{ url_for('static', filename='icons/nachalo.png') }}" alt="Начало">

      <form class="auth-form" method="post" action="{{ url_for('start') }}">
        <label class="field">
          <span>Имя сотрудника</span>
          <input name="name" placeholder="Например: Мадина" autocomplete="off" />
        </label>

        <label class="field">
          <span>Смена</span>
          <select name="shift">
            <option value="1" selected>1 смена</option>
            <option value="2">2 смена</option>
            <option value="3">3 смена</option>
          </select>
        </label>

        <button class="btn primary btn-wide" type="submit">Начать</button>
      </form>

      <div class="muted small auth-hint">
        Подсказка: в игре перетаскивание = <b>обмен местами</b>.
      </div>
    </div>
  </div>

</body>
</html>
